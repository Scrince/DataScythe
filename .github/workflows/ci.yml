name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-windows:
    name: Build and test (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        shell: pwsh
        run: |
          cmake -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release -DDATASCYTHE_BUILD_GUI=OFF

      - name: Build
        shell: pwsh
        run: cmake --build build

      - name: Test
        shell: pwsh
        run: ctest --test-dir build --output-on-failure

      - name: CLI smoke
        shell: pwsh
        run: |
          .\build\apps\cli\datascythe.exe --version
          .\build\apps\cli\datascythe.exe --help