name: Release Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - windows-latest
          - ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake qt6-base-dev

      - name: Configure Windows
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          cmake -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release -DDATASCYTHE_BUILD_GUI=OFF

      - name: Configure Linux
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DDATASCYTHE_BUILD_GUI=OFF

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: datascythe-${{ matrix.platform }}
          path: |
            build/apps/cli/datascythe*
            build/apps/gui/DataScythe*
          if-no-files-found: warn